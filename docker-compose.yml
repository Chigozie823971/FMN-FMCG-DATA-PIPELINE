name: fmn-fmcg-new-pipeline-v2

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fmn-fmcg-data-pipeline-postgres-1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fmcg_analytics
    ports:
      - "5432:5432"
    restart: always

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: fmn-fmcg-airflow-webserver
    command: >
      bash -c "airflow db init &&
      airflow users create --username airflow --password airflow --firstname Admin --lastname Admin --role Admin --email admin@fmcg.com &&
      airflow webserver"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      # ADDED ?timeout=30000 TO PREVENT SQLITE LOCK CRASHES
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db?timeout=30000
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
    ports:
      - "8087:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_metadata:/opt/airflow
    restart: always

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: fmn-fmcg-airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      # MATCHING THE TIMEOUT HERE TOO
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db?timeout=30000
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_metadata:/opt/airflow
    restart: always

volumes:
  airflow_metadata: