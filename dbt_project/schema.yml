version: 2

sources:
  - name: raw_source
    schema: raw_source
    tables:
      - name: raw_transactions
      - name: raw_products
      - name: raw_distributors
      - name: raw_salespersons
      - name: raw_monthly_targets
      - name: raw_date_table

models:
  - name: stg_transactions
    description: "Staged transaction record feed with cast data types"
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: transaction_status
        tests:
          - accepted_values:
              values: ['Completed', 'Returned', 'Cancelled', 'Pending']